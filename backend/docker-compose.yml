services:
  api:
    build: .
    container_name: nortefirme-api
    environment:
      APP_NAME: ${APP_NAME:-Norte Firme API}
      APP_ENV: ${APP_ENV:-development}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/nortefirme_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-for-local-development}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ALLOW_ADMIN_REGISTRATION: ${ALLOW_ADMIN_REGISTRATION:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,https://nortefirme.com.mx}
      UPLOAD_BACKEND: ${UPLOAD_BACKEND:-local}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: nortefirme-postgres
    environment:
      POSTGRES_DB: nortefirme_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nortefirme_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: nortefirme-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nortefirme.com.mx
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
